[project]
name = "irij.online"

# Website's own SemVer — independent of the Irij engine version shown on the
# page (that one is auto-stamped from the toolchain at build time). Bump by hand
# via ./scripts/release: PATCH for engine bumps/small fixes, MINOR for site
# features, MAJOR for big reworks.
version = "1.0.0"
description = "Irij language website, seeds registry and playground"

[seeds]
# Temporary git-dep bypass — registry endpoint on the live site is
# broken (effect-row runtime error from a prior strict-row push),
# breaking CI smoke-test chicken-and-egg. Once the new site deploys
# and the live registry serves vrata 0.1.3 again, restore the line:
#   vrata = "0.1.3"
vrata = { git = "https://github.com/aldebogdanov/vrata.git", tag = "v0.1.3" }
