[project]
name = "irij.online"

# Website's own version — independent of the Irij engine version shown on the
# page (that one is auto-stamped from the toolchain at build time). This is the
# 2-part MAJOR.MINOR *base*: the released version is base + "." + the git commit
# count (see ./scripts/release). Bump the base by hand only for a MINOR site
# feature or a MAJOR rework; engine bumps and small fixes just ride the commit
# count.
version = "1.0"
description = "Irij language website, seeds registry and playground"

[seeds]
# Git-tag dep (not registry) — bypasses the chicken-and-egg: the live
# registry can't serve a fixed vrata until the site that hosts it is
# rebuilt against a fixed vrata. v0.2.1 carries the void-element guard
# (published 0.2.0 crashed every page with a <link> in the head).
# Once this build deploys and the registry is healthy, `irij publish`
# vrata 0.2.1 and restore the registry dep:  vrata = "0.2.1"
vrata = "0.2.11"
# { git = "https://github.com/aldebogdanov/vrata.git", tag = "v0.2.1" }
